name: Build and Release MyStation Firmware

#on: push
on:
    push:
        # when pull request is created, 2 github actions are triggered, one for push and one for pull_request
        # to avoid double builds, we only build on to pull_request
        #        branches:
        #            - '*'
        tags: [ 'v*' ]
    pull_request:
        branches: [ main ]

env:
    PLATFORMIO_CORE_VERSION: "6.1.19"

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - environment: esp32-s3-e1001-production
                      asset_name: firmware-e1001.bin
                    - environment: esp32-s3-ee04-production
                      asset_name: firmware-ee04.bin

        steps:
            -   name: Checkout code
                uses: actions/checkout@v5

            -   name: Cache PlatformIO
                uses: actions/cache@v5
                with:
                    path: |
                        ~/.cache/pip
                        ~/.platformio/.cache
                        ~/.platformio/packages
                    key: ${{ runner.os }}-pio
            -   name: Set up Python
                uses: actions/setup-python@v6
                with:
                    python-version: '3.11'

            -   name: Install PlatformIO
                run: |
                    pip install --upgrade platformio==${{ env.PLATFORMIO_CORE_VERSION }}

            -   name: Check GCC version  # Add this step
                run: |
                    gcc --version
                    g++ --version
                    echo "---"
                    which gcc
                    which g++

            -   name: Unit test
                run: |
                    pio test -e native -v

            -   name: Create secrets files from environment variables
                run: |
                    cat > include/secrets/general_secrets.h << 'SECRETS_EOF'
                    #pragma once
                    #define GOOGLE_API_KEY "${{ secrets.GOOGLE_API_KEY }}"
                    #define ENCRYPTION_KEY "${{ secrets.ENCRYPTION_KEY }}"
                    #define RMV_API_KEY "${{ secrets.RMV_API_KEY }}"
                    SECRETS_EOF
            #                    echo "#define GOOGLE_API_KEY \"${{ secrets.GOOGLE_API_KEY }}\"" >> include/secrets/general_secrets.h
            #                    echo "#define RMV_API_KEY \"${{ secrets.RMV_API_KEY }}\"" >> include/secrets/general_secrets.h
            #                    echo "#define ENCRYPTION_KEY \"${{ secrets.ENCRYPTION_KEY }}\"" >> include/secrets/general_secrets.h
            #                     Verify secrets are not empty (lengths will be shown, not actual values)
            #                    echo "Verifying secrets file..."
            #                    echo "GOOGLE_API_KEY length: $(grep GOOGLE_API_KEY include/secrets/general_secrets.h | wc -c)"
            #                    echo "RMV_API_KEY length: $(grep RMV_API_KEY include/secrets/general_secrets.h | wc -c)"
            #                    echo "ENCRYPTION_KEY length: $(grep ENCRYPTION_KEY include/secrets/general_secrets.h | wc -c)"

            -   name: Build firmware
                run: |
                    pio run -e ${{ matrix.environment }}

            -   name: Create build info
                run: |
                    echo "Build Information" > build_info.txt
                    echo "==================" >> build_info.txt
                    echo "Commit: ${{ github.sha }}" >> build_info.txt
                    echo "Branch: ${{ github.ref_name }}" >> build_info.txt
                    echo "Environment: ${{ matrix.environment }}" >> build_info.txt
                    echo "Build Date: $(date -u)" >> build_info.txt
                    echo "PlatformIO Version: ${{ env.PLATFORMIO_CORE_VERSION }}" >> build_info.txt

            -   name: Rename firmware to board-specific name
                run: |
                    cp .pio/build/${{ matrix.environment }}/firmware.bin .pio/build/${{ matrix.environment }}/${{ matrix.asset_name }}

            -   name: Upload firmware artifacts
                uses: actions/upload-artifact@v7
                with:
                    name: firmware-${{ matrix.environment }}-${{ github.sha }}
                    path: |
                        .pio/build/${{ matrix.environment }}/${{ matrix.asset_name }}
                        .pio/build/${{ matrix.environment }}/bootloader.bin
                        .pio/build/${{ matrix.environment }}/partitions.bin
                        build_info.txt
                    retention-days: 30

    release:
        needs: build
        runs-on: ubuntu-latest
        if: github.ref_type == 'tag'

        steps:
            -   name: Download all artifacts
                uses: actions/download-artifact@v8
                with:
                    path: artifacts
                    merge-multiple: true

            -   name: Create release package
                run: |
                    mkdir -p release

                    # Copy board-specific firmware files
                    find artifacts -name "firmware-*.bin" -exec cp {} release/ \;
                    # Copy shared files (bootloader/partitions from first build as reference for initial flash)
                    find artifacts -name "bootloader.bin" | head -1 | xargs -I{} cp {} release/
                    find artifacts -name "partitions.bin" | head -1 | xargs -I{} cp {} release/
                    find artifacts -name "build_info.txt" | head -1 | xargs -I{} cp {} release/

                    ls -la release/

            -   name: Create Release
                uses: softprops/action-gh-release@v2
                with:
                    files: |
                        release/firmware-e1001.bin
                        release/firmware-ee04.bin
                        release/bootloader.bin
                        release/partitions.bin
                        release/build_info.txt
                    name: MyStation ${{ github.ref_name }}
                    body: |
                        # MyStation Firmware Release ${{ github.ref_name }}
                    draft: true
                    prerelease: false
                    generate_release_notes: true
                    token: ${{ secrets.ACTION_TOKEN }}
